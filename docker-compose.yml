version: '3.9'

services:
  # OpenAutonomyX Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openautonomyx-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://openautonomyx:secure_password@postgres:5432/openautonomyx
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ollama
      LLM_MODEL: mistral
      OLLAMA_API_URL: http://ollama:11434
      STORAGE_TYPE: local
      STORAGE_PATH: /data/uploads
    volumes:
      - ./data:/data
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openautonomyx

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openautonomyx-postgres
    environment:
      POSTGRES_USER: openautonomyx
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: openautonomyx
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openautonomyx -d openautonomyx"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openautonomyx

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openautonomyx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openautonomyx

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: openautonomyx-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openautonomyx
    # Note: Models need to be pulled manually:
    # docker exec openautonomyx-ollama ollama pull mistral

  # pgAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openautonomyx-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openautonomyx.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - openautonomyx

  # Redis Commander for Cache Inspection (Optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: openautonomyx-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - openautonomyx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  openautonomyx:
    driver: bridge
