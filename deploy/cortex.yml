# Cortex Configuration - Distributed metrics storage for high availability
# Replaces single Prometheus instance with scalable, distributed metrics

server:
  http_listen_port: 9009
  log_level: info

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  max_streams_per_user: 10000
  lifecycler:
    ring:
      replication_factor: 1
    num_tokens: 128
    heartbeat_timeout: 5m

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_global_series_per_user: 10000
  max_global_streams_per_user: 10000

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /cortex/boltdb-shipper-active
    cache_location: /cortex/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /cortex/chunks

chunk_cache_config:
  cache:
    enable_fifocache: true
    default_validity: 1h
    background:
      writeback_goroutines: 10
      writeback_delay: 5s

query_range:
  align_queries_with_step: true
  cache_results: true
  max_retries: 5
  split_queries_by_interval: 24h
  results_cache:
    cache:
      enable_fifocache: true
      default_validity: 1m
      background:
        writeback_goroutines: 10
        writeback_delay: 5s
