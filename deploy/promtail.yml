# Promtail Configuration - Sends container logs to Loki
# Collects logs from all containers and forwards to centralized Loki

server:
  http_listen_port: 9080
  log_level: info

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ===========================================================================
  # Docker Container Logs
  # ===========================================================================
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
      - labels:
          stream:
      - output:
          source: output

  # ===========================================================================
  # API Service Logs
  # ===========================================================================
  - job_name: api
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          app: creative-platform-api
          __path__: /var/lib/docker/containers/*/api/*-json.log
    pipeline_stages:
      - json:
          expressions:
            message: log
            level: level
            timestamp: timestamp
            service: service
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: message

  # ===========================================================================
  # PostgreSQL Logs
  # ===========================================================================
  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          app: postgresql
          __path__: /var/lib/docker/containers/*/postgres/*-json.log
    pipeline_stages:
      - json:
          expressions:
            message: log
            level: level
      - labels:
          level:
      - output:
          source: message

  # ===========================================================================
  # Redis Logs
  # ===========================================================================
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          app: redis
          __path__: /var/lib/docker/containers/*/redis/*-json.log
    pipeline_stages:
      - json:
          expressions:
            message: log
      - output:
          source: message

  # ===========================================================================
  # Temporal Logs
  # ===========================================================================
  - job_name: temporal
    static_configs:
      - targets:
          - localhost
        labels:
          job: temporal
          app: temporal-server
          __path__: /var/lib/docker/containers/*/temporal/*-json.log
    pipeline_stages:
      - json:
          expressions:
            message: log
            level: level
            namespace: namespace
      - labels:
          level:
          namespace:
      - output:
          source: message
