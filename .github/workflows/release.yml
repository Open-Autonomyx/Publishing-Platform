name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          cd src/api
          GOOS=linux GOARCH=amd64 go build -o creative-platform-api-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o creative-platform-api-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o creative-platform-api-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o creative-platform-api-windows-amd64.exe .

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          artifacts: "src/api/creative-platform-api-*"
          token: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: src/api
          file: src/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/creative-platform-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/creative-platform-api:latest
