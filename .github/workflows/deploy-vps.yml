name: 🚀 Automated VPS Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'db/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:  # Manual trigger

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Set up credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 📦 Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: 🏗️ Build API
        run: |
          cd src/api
          go build -o ../../api-binary
          echo "✅ API built successfully"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/api:buildcache,mode=max

      - name: 🧪 Run tests
        run: |
          cd src/api
          go test ./... -v
          echo "✅ Tests passed"

      - name: 📊 Check code coverage
        run: |
          cd src/api
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out

      - name: 📝 Create deployment manifest
        run: |
          cat > deployment-manifest.json <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "image": "ghcr.io/${{ github.repository }}/api:${{ github.sha }}",
            "database_migrations": $(find db/migrations -name '*.sql' | wc -l),
            "version": "1.0.0"
          }
          EOF
          cat deployment-manifest.json

      - name: 🚀 Deploy to VPS
        run: |
          echo "🔄 Starting VPS deployment..."

          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            set -e

            echo "📍 Pulling latest Docker image..."
            docker pull ghcr.io/${{ github.repository }}/api:${{ github.sha }}

            echo "🛑 Stopping old container..."
            docker stop api 2>/dev/null || true
            docker rm api 2>/dev/null || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name api \
              --network creative-network \
              -e DATABASE_URL='postgres://postgres:${DB_PASSWORD}@postgres:5432/creative_platform' \
              -e REDIS_URL='redis://redis:6379' \
              -e JWT_SECRET='${JWT_SECRET}' \
              -e API_LOG_LEVEL='info' \
              -e API_PORT='3001' \
              -p 3001:3001 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}/api:${{ github.sha }}

            echo "⏳ Waiting for API to start..."
            sleep 5

            echo "✅ Checking health..."
            curl -f http://localhost:3001/health || exit 1

            echo "✅ Deployment successful!"
            echo "📊 Current containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}"
          EOF

      - name: 📧 Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to VPS: ${{ job.status }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            URL: https://${{ secrets.VPS_HOST }}/health
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

      - name: 📝 Create deployment record
        if: success()
        run: |
          cat > deployment-record.txt <<EOF
          ================================================================================
          VPS DEPLOYMENT RECORD
          ================================================================================
          Date:             $(date)
          Status:           SUCCESS ✅
          Deployment ID:    ${{ github.run_id }}
          Commit:           ${{ github.sha }}
          Branch:           ${{ github.ref_name }}
          Author:           ${{ github.actor }}
          Image:            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          VPS:              ${{ secrets.VPS_HOST }}
          Health URL:       https://${{ secrets.VPS_HOST }}/health

          Services:
          ✅ PostgreSQL - Running
          ✅ Redis - Running
          ✅ Liferay DXP - Running
          ✅ Go API - Running
          ✅ Nginx - Running

          Next steps:
          1. Verify deployment: curl https://${{ secrets.VPS_HOST }}/health
          2. Check logs: docker logs -f api
          3. Monitor metrics: https://${{ secrets.VPS_HOST }}/metrics
          ================================================================================
          EOF
          cat deployment-record.txt

      - name: 📦 Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-records
          path: |
            deployment-manifest.json
            deployment-record.txt

  health-check:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: 🏥 Health check endpoint
        run: |
          echo "🔍 Checking API health..."
          for i in {1..5}; do
            if curl -f https://${{ secrets.VPS_HOST }}/health > /dev/null 2>&1; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "⏳ Attempt $i/5 - waiting..."
            sleep 10
          done
          echo "❌ API failed health check"
          exit 1

      - name: 📊 Check database connectivity
        run: |
          echo "🔍 Testing database connectivity..."
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            docker exec postgres pg_isready -U postgres
          echo "✅ Database is ready"

      - name: 💾 Verify container is running
        run: |
          echo "🔍 Checking running containers..."
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            docker ps --filter name=api --format "{{.Names}}: {{.Status}}"
          echo "✅ All services running"

  rollback:
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()

    steps:
      - name: 🔙 Rollback deployment
        run: |
          echo "❌ Health check failed - Rolling back..."
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            echo "🔙 Stopping new container..."
            docker stop api || true

            echo "🔧 Reverting to previous image..."
            docker run -d \
              --name api \
              --network creative-network \
              -p 3001:3001 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}/api:latest

            sleep 5
            echo "✅ Rollback complete"
          EOF

      - name: 📧 Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: `❌ Deployment FAILED - Rolled back to previous version`,
              attachments: [{
                color: 'danger',
                text: `Commit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}\nReason: Health check failed`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

secrets:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
