version: '3.8'

# Extended monitoring stack for 24/7 system reliability
# Includes: ClickHouse (logs/metrics), Cortex (distributed metrics), Temporal (workflow orchestration)

services:
  # ============================================================================
  # ClickHouse - Long-term log and metrics storage
  # ============================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: creative-clickhouse
    environment:
      CLICKHOUSE_DB: metrics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - creative-network
    restart: unless-stopped

  # ============================================================================
  # Cortex - Distributed Prometheus metrics storage (high-availability)
  # ============================================================================
  cortex:
    image: cortexproject/cortex:latest
    container_name: creative-cortex
    command:
      - -config.file=/etc/cortex/cortex.yml
    ports:
      - "9009:9009"  # Cortex query interface
    volumes:
      - ./deploy/cortex.yml:/etc/cortex/cortex.yml
      - cortex_data:/cortex
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9009/api/prom/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - creative-network
    depends_on:
      - clickhouse
    restart: unless-stopped

  # ============================================================================
  # Temporal Server - Workflow orchestration (background jobs, retries, alerting)
  # ============================================================================
  temporal:
    image: temporalio/auto-setup:latest
    container_name: creative-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal_password
      POSTGRES_DB: temporal
      DB_HOST: postgres
      TEMPORAL_PERSISTENCE_NUM_HISTORY_SHARDS: 4
      TEMPORAL_PERSISTENCE_DRIVER_FAILOVER_MANAGER_MAX_RANDOMIZATION_INTERVAL: 100m
    ports:
      - "6933:6933"  # Frontend gRPC
      - "7233:7233"  # Frontend HTTP
      - "7239:7239"  # Matching service
      - "7234:7234"  # History service
      - "7235:7235"  # Worker service
    healthcheck:
      test: ["CMD", "tctl", "--namespace", "default", "namespace", "describe"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - creative-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # Temporal UI - Visual workflow monitoring
  # ============================================================================
  temporal-ui:
    image: temporalio/ui:latest
    container_name: creative-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - creative-network
    depends_on:
      - temporal
    restart: unless-stopped

  # ============================================================================
  # Loki - Log aggregation (replaces simple file logging)
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: creative-loki
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - creative-network
    restart: unless-stopped

  # ============================================================================
  # Promtail - Log shipper (sends API logs to Loki)
  # ============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: creative-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - creative-network
    depends_on:
      - loki
    restart: unless-stopped

  # ============================================================================
  # Alertmanager - Alert routing and notifications
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: creative-alertmanager
    volumes:
      - ./deploy/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - creative-network
    restart: unless-stopped

networks:
  creative-network:
    external: true

volumes:
  clickhouse_data:
  cortex_data:
  loki_data:
  alertmanager_data:
